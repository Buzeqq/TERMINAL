services: 
  terminal.poc.reverse-proxy:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./config/nginx:/etc/nginx/conf.d
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on: [terminal.poc.backend, terminal.poc.frontend]
    
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on: [terminal.poc.reverse-proxy]

  terminal.poc.backend:
    build:
      context: .
      dockerfile: Dockerfile
    
  terminal.poc.frontend:
    build:
      context: client
      dockerfile: Dockerfile
