<label>Online: {{$isOnline | async}}</label>
<section class="measurements">
  <table mat-table [dataSource]="data"
         matSort matSortActive="created" matSortDirection="desc">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let row">{{row.id}}</td>
    </ng-container>

    <ng-container matColumnDef="value">
      <th mat-header-cell *matHeaderCellDef>Value</th>
      <td mat-cell *matCellDef="let row">
        <div *ngIf="!row.isEditing else editable">
          {{row.value}}
        </div>
        <ng-template #editable>
          <mat-form-field>
            <input matInput type="number" [(ngModel)]="row.value">
          </mat-form-field>
        </ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="created">
      <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear>
        Created
      </th>
      <td mat-cell *matCellDef="let row">{{row.createdOnUtc | date}}</td>
    </ng-container>

    <ng-container matColumnDef="isEditing">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <div *ngIf="!row.isEditing">
          <button mat-button (click)="row.isEditing = !row.isEditing">Edit</button>
        </div>
        <div *ngIf="row.isEditing">
          <button mat-button (click)="row.isEditing = !row.isEditing; update(row)">Update</button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
</section>
<button mat-raised-button color="accent" (click)="logData()">LogData</button>
<button mat-raised-button color="accent" (click)="addData()">Add new data</button>
